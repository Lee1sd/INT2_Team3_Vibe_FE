<svg width="3300" height="900" viewBox="0 0 3300 900" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif;"><text x="512" y="40" font-size="32px" fill="#333333" font-weight="bold" text-anchor="middle">1. Login (/)</text>
