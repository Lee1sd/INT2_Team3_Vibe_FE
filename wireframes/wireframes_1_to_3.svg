  <text x="1586" y="510" font-size="14px" fill="#777777" font-weight="normal" text-anchor="middle">지원 형식: PDF, TXT, MD (최대 10MB)</text>
<text x="2660" y="40" font-size="32px" fill="#333333" font-weight="bold" text-anchor="middle">3. Dungeon (/dungeon)</text>
