  <text x="512" y="490" font-size="14px" fill="#777777" font-weight="normal" text-anchor="middle">격파하고 신뢰도를 얻어내세요!</text>
  
  <rect x="352" y="510" width="320" height="48" rx="8" fill="#dddddd" stroke="#e0e0e0" />
  <text x="512" y="540" font-size="14px" fill="#555555" font-weight="bold" text-anchor="middle">Google 계정으로 시작하기</text>
  
  <rect x="412" y="610" width="200" height="32" rx="8" fill="#f5f5f5" stroke="#e0e0e0" />
  <text x="512" y="630" font-size="12px" fill="#777777" font-weight="normal" text-anchor="middle">INFO Mock 모드입니다.</text>
<text x="1586" y="40" font-size="32px" fill="#333333" font-weight="bold" text-anchor="middle">2. Resume Upload (/upload)</text>
  <rect x="1074" y="80" width="1024" height="768" rx="8" fill="#f5f5f5" stroke="#e0e0e0" />
  
  <rect x="1074" y="80" width="1024" height="60" rx="0" fill="#ffffff" stroke="#e0e0e0" />
  <rect x="1094" y="90" width="40" height="40" rx="8" fill="#cccccc" stroke="none" />
  <text x="1149" y="115" font-size="18px" fill="#333333" font-weight="bold" text-anchor="start">커리어 던전</text>
  <circle cx="2068" cy="110" r="16" fill="#cccccc" stroke="none"/>

  
  <rect x="1536" y="180" width="100" height="24" rx="4" fill="#dddddd" stroke="none" />
  <text x="1586" y="196" font-size="12px" fill="#555555" font-weight="bold" text-anchor="middle">STEP 01</text>
  
  <text x="1586" y="235" font-size="26px" fill="#333333" font-weight="bold" text-anchor="middle">무기(이력서) 장착</text>
  <text x="1586" y="265" font-size="14px" fill="#777777" font-weight="normal" text-anchor="middle">이력서를 업로드하여 당신만의 맞춤형 면접 던전을 생성하세요.</text>
  
